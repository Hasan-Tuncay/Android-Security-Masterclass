name: Android CI/CD & SAST Security Checks

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  sast_and_build:
    name: Build & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Uncomment below if Detekt is configured in your build.gradle
      # - name: Run Detekt (Static Code Analysis)
      #   run: ./gradlew detekt

      - name: Run Android Lint (SAST)
        run: ./gradlew lintDebug

      - name: Build Debug APKs
        run: ./gradlew assembleDebug
